<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Calculador de Envíos</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.rango{
margin-bottom:12px;
}

input{
padding:5px;
margin:3px;
width:90px;
}

.costo{
width:80px;
}

.resultado{
margin-top:30px;
padding-top:20px;
border-top:1px solid #ccc;
}

h3{
margin-bottom:5px;
}

</style>

</head>


<body>

<h2>Configuración de Rangos</h2>


<div class="rango">
<strong>Rango 1</strong><br>

Desde
<input id="d1">

Hasta
<input id="h1">

Costo envío $
<input id="c1" class="costo">

<label>
<input type="checkbox" id="iva1">
Sumar IVA 21%
</label>

</div>


<div class="rango">
<strong>Rango 2</strong><br>

Desde
<input id="d2">

Hasta
<input id="h2">

Costo envío $
<input id="c2" class="costo">

<label>
<input type="checkbox" id="iva2">
Sumar IVA 21%
</label>

</div>


<div class="rango">
<strong>Rango 3</strong><br>

Desde
<input id="d3">

Hasta
<input id="h3">

Costo envío $
<input id="c3" class="costo">

<label>
<input type="checkbox" id="iva3">
Sumar IVA 21%
</label>

</div>


<div class="rango">
<strong>Rango 4</strong><br>

Desde
<input id="d4">

Hasta
<input id="h4">

Costo envío $
<input id="c4" class="costo">

<label>
<input type="checkbox" id="iva4">
Sumar IVA 21%
</label>

</div>



<div class="rango">
<strong>RESTO</strong><br>

Costo envío $
<input id="cResto" class="costo">

<label>
<input type="checkbox" id="ivaResto">
Sumar IVA 21%
</label>

</div>



<button onclick="calcular()">Calcular</button>


<div class="resultado" id="resultado"></div>



<script>

let codigosPostales = [
1000,1100,1200,1300,1400,
1500,1600,1700,1800,
2000,2100,2200,2300,
3000,3100,3200,
4000,4100,4200
];



function aplicarIVA(costo, checkbox){

if(checkbox){
return costo * 1.21
}

return costo

}



function calcular(){

let usados = []
let html = ""

for(let i=1;i<=4;i++){

let desde = parseInt(document.getElementById("d"+i).value)
let hasta = parseInt(document.getElementById("h"+i).value)

let costo = parseFloat(document.getElementById("c"+i).value) || 0
let iva = document.getElementById("iva"+i).checked

costo = aplicarIVA(costo, iva)


if(!isNaN(desde) && !isNaN(hasta)){

let encontrados = codigosPostales.filter(cp => cp >= desde && cp <= hasta)

usados = usados.concat(encontrados)

let cantidad = encontrados.length

let total = cantidad * costo


html += `
<h3>Rango desde ${desde} hasta ${hasta}</h3>
Cantidad: ${cantidad}<br>
Costo unitario: $${costo.toFixed(2)}<br>
Total rango: $${total.toFixed(2)}
<br><br>
`

}

}



let resto = codigosPostales.filter(cp => !usados.includes(cp))

let costoResto = parseFloat(document.getElementById("cResto").value) || 0
let ivaResto = document.getElementById("ivaResto").checked

costoResto = aplicarIVA(costoResto, ivaResto)

let totalResto = resto.length * costoResto


html += `
<h3>Resto</h3>
Cantidad: ${resto.length}<br>
Costo unitario: $${costoResto.toFixed(2)}<br>
Total resto: $${totalResto.toFixed(2)}
`


document.getElementById("resultado").innerHTML = html

}

</script>



</body>
</html>
