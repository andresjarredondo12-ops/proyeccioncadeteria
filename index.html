<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Profesional de Suscripciones</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
h2 { margin-top: 30px; }
select, input { margin: 5px; padding: 5px; }
button { padding: 6px 12px; cursor: pointer; margin-top: 10px; }
.multi-select { width: 300px; height: 160px; }
.config-box { background: #f5f5f5; padding: 10px; margin-bottom: 15px; }
.result-box { background: #e9f5ff; padding: 10px; margin-top: 15px; }
</style>
</head>
<body>

<h1>Sistema Profesional de Gestión</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls" />

<h2>Seleccionar revistas</h2>

<select id="filtroMultiple" multiple class="multi-select">
<option>Daños</option>
<option>Privado</option>
<option>Procesal</option>
<option>Penal</option>
<option>Procesal Penal</option>
<option>Laboral</option>
<option>Actualidad</option>
<option>Penal Económico</option>
</select>
<br>
<small>Use CTRL para seleccionar varias</small>
<br>
<button onclick="contarIndividual()">Contar Seleccionadas</button>

<div id="resultadoConteo" class="result-box"></div>

<h2>Configuración Peso por Revista (kg)</h2>

<div class="config-box">
Daños: <input type="number" step="0.1" data-revista="danos" value="0.5"><br>
Privado: <input type="number" step="0.1" data-revista="privado" value="0.5"><br>
Procesal: <input type="number" step="0.1" data-revista="procesal" value="0.5"><br>
Penal: <input type="number" step="0.1" data-revista="penal" value="0.5"><br>
Procesal Penal: <input type="number" step="0.1" data-revista="procesal penal" value="0.5"><br>
Laboral: <input type="number" step="0.1" data-revista="laboral" value="0.5"><br>
Actualidad: <input type="number" step="0.1" data-revista="actualidad" value="0.5"><br>
Penal Económico: <input type="number" step="0.1" data-revista="penal economico" value="0.5"><br>
</div>

<button onclick="calcularTodo()">Generar Combinaciones y Calcular Envío</button>

<h2>Combinaciones Exactas</h2>
<div id="resultadoCombinaciones" class="result-box"></div>

<h2>Resumen Envíos</h2>
<div id="resultadoEnvio" class="result-box"></div>

<script>

let datos = [];

// Normalizar texto
function limpiarTexto(texto) {
if (!texto) return "";
return texto.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

// Detectar columnas
function detectarColumnas(objeto) {
let columnas = Object.keys(objeto);
let cuentaCol = columnas.find(c => limpiarTexto(c).includes("cuenta"));
let suscripcionCol = columnas.find(c => limpiarTexto(c).includes("suscrip"));
return { cuentaCol, suscripcionCol };
}

// Cargar Excel
document.getElementById('excelFile').addEventListener('change', function(e) {

const reader = new FileReader();

reader.onload = function(event) {

const data = new Uint8Array(event.target.result);
const workbook = XLSX.read(data, {type: 'array'});
const sheet = workbook.Sheets[workbook.SheetNames[0]];
let raw = XLSX.utils.sheet_to_json(sheet);

if(raw.length === 0){
alert("Archivo vacío");
return;
}

let {cuentaCol, suscripcionCol} = detectarColumnas(raw[0]);

if(!cuentaCol || !suscripcionCol){
alert("No se detectaron columnas correctas");
return;
}

datos = raw.map(r => ({
cuenta: limpiarTexto(r[cuentaCol]),
suscripcion: limpiarTexto(r[suscripcionCol])
}));

alert("Archivo cargado correctamente");

};

reader.readAsArrayBuffer(e.target.files[0]);

});

// Contar revistas seleccionadas individualmente
function contarIndividual(){

let seleccionadas = Array.from(
document.getElementById("filtroMultiple").selectedOptions
).map(o => limpiarTexto(o.value));

let cuentas = {};

datos.forEach(d => {
if(!cuentas[d.cuenta]) cuentas[d.cuenta] = new Set();
cuentas[d.cuenta].add(d.suscripcion);
});

let resultadoHTML = "";

seleccionadas.forEach(revista => {

let contador = 0;

for(let cuenta in cuentas){
if(cuentas[cuenta].has(revista)) contador++;
}

resultadoHTML += revista.toUpperCase() + ": <b>" + contador + "</b><br>";

});

document.getElementById("resultadoConteo").innerHTML = resultadoHTML;

}

// Generar combinaciones exactas y calcular envío
function calcularTodo(){

let cuentas = {};
let totalEnvio = 0;
let pesoTotalGeneral = 0;

datos.forEach(d => {
if(!cuentas[d.cuenta]) cuentas[d.cuenta] = new Set();
cuentas[d.cuenta].add(d.suscripcion);
});

// GENERAR COMBINACIONES EXACTAS
let combinaciones = {};

for(let cuenta in cuentas){

let lista = Array.from(cuentas[cuenta]).sort();
let clave = lista.join(" + ");

if(!combinaciones[clave]) combinaciones[clave] = 0;
combinaciones[clave]++;

}

// Mostrar combinaciones
let htmlComb = "";
for(let comb in combinaciones){
htmlComb += comb.toUpperCase() + ": <b>" + combinaciones[comb] + "</b><br>";
}

document.getElementById("resultadoCombinaciones").innerHTML = htmlComb;


// CALCULO ENVIO
for(let cuenta in cuentas){

let pesoCuenta = 0;

cuentas[cuenta].forEach(sub => {
let input = document.querySelector(`[data-revista="${sub}"]`);
if(input) pesoCuenta += parseFloat(input.value);
});

pesoTotalGeneral += pesoCuenta;

let costo = 0;

if(pesoCuenta <= 1) costo = parseFloat(document.getElementById("costo1").value);
else if(pesoCuenta <= 2) costo = parseFloat(document.getElementById("costo2").value);
else if(pesoCuenta <= 5) costo = parseFloat(document.getElementById("costo5").value);
else costo = parseFloat(document.getElementById("costo10").value);

totalEnvio += costo;

}

document.getElementById("resultadoEnvio").innerHTML =
"Peso total general: <b>" + pesoTotalGeneral.toFixed(2) + " kg</b><br>" +
"Costo total de envío: <b>$" + totalEnvio.toLocaleString() + "</b>";

}

</script>

</body>
</html>
