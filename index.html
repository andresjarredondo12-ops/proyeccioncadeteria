<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Combinaciones por Cuenta</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
margin:20px;
}

h2{
margin-top:30px;
}

input,select{
margin:5px;
padding:6px;
}

button{
padding:8px 14px;
cursor:pointer;
}

.box{
background:#f5f5f5;
padding:12px;
margin-top:10px;
}

.result{
background:#e9f5ff;
padding:12px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Sistema de Suscripciones</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<h2>Filtro Revistas</h2>

<div class="box">

<select id="revistasFiltro" multiple size="8">

<option value="danos">Daños</option>
<option value="privado">Privado</option>
<option value="procesal">Procesal</option>
<option value="penal">Penal</option>
<option value="procesal penal">Procesal Penal</option>
<option value="laboral">Laboral</option>
<option value="actualidad">Lab.Act.</option>
<option value="penal economico">Penal Económico</option>

</select>

</div>

<h2>Filtro Código Postal</h2>

<div class="box">

CP Exacto:
<input type="number" id="cpExacto">

<br>

Desde:
<input type="number" id="cpDesde">

Hasta:
<input type="number" id="cpHasta">

</div>

<h2>Peso por Revista (kg)</h2>

<div class="box">

Daños
<input type="number" step="0.1" data-revista="danos" value="0.5"><br>

Privado
<input type="number" step="0.1" data-revista="privado" value="0.5"><br>

Procesal
<input type="number" step="0.1" data-revista="procesal" value="0.5"><br>

Penal
<input type="number" step="0.1" data-revista="penal" value="0.5"><br>

Procesal Penal
<input type="number" step="0.1" data-revista="procesal penal" value="0.5"><br>

Laboral
<input type="number" step="0.1" data-revista="laboral" value="0.5"><br>

Lab.Act.
<input type="number" step="0.1" data-revista="actualidad" value="0.5"><br>

Penal Económico
<input type="number" step="0.1" data-revista="penal economico" value="0.5"><br>

</div>

<h2>Costos de Envío</h2>

<div class="box">

Hasta 1kg
<input type="number" id="costo1" value="5090"><br>

Hasta 2kg
<input type="number" id="costo2" value="7000"><br>

Hasta 5kg
<input type="number" id="costo5" value="12000"><br>

Hasta 10kg
<input type="number" id="costo10" value="20000"><br>

</div>

<button onclick="procesar()">Procesar</button>

<h2>Combinaciones Exactas</h2>
<div id="resultadoCombinaciones" class="result"></div>

<h2>Resumen Envíos</h2>
<div id="resultadoEnvio" class="result"></div>

<script>

let datos = []

function normalizar(texto){

if(!texto) return ""

return texto.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")

}

function clasificarSuscripcion(texto){

let t = normalizar(texto)

/* DETECCIÓN ESPECÍFICA LAB.ACT. */

if(
t.includes("lab.act.") ||
t.includes("lab.act") ||
t.includes("lab. act.") ||
t.includes("lab act")
) return "actualidad"

if(t.includes("procesal penal")) return "procesal penal"
if(t.includes("penal econom")) return "penal economico"

if(t.includes("danos")) return "danos"
if(t.includes("privado")) return "privado"
if(t.includes("procesal")) return "procesal"
if(t.includes("penal")) return "penal"
if(t.includes("laboral")) return "laboral"

return null

}

function detectarColumnas(obj){

let columnas = Object.keys(obj)

let cuentaCol = columnas.find(c => normalizar(c).includes("cuenta"))
let suscripcionCol = columnas.find(c => normalizar(c).includes("suscrip"))
let cpCol = columnas.find(c =>
normalizar(c).includes("postal") ||
normalizar(c) === "cp"
)

return {cuentaCol,suscripcionCol,cpCol}

}

document.getElementById("excelFile").addEventListener("change",function(e){

const reader = new FileReader()

reader.onload = function(event){

const data = new Uint8Array(event.target.result)

const workbook = XLSX.read(data,{type:'array'})

const sheet = workbook.Sheets[workbook.SheetNames[0]]

const json = XLSX.utils.sheet_to_json(sheet)

if(json.length === 0){

alert("Archivo vacío")
return

}

const {cuentaCol,suscripcionCol,cpCol} = detectarColumnas(json[0])

if(!cuentaCol || !suscripcionCol){

alert("No se detectaron columnas de Cuenta o Suscripción")
return

}

datos = json.map(row => ({

cuenta: normalizar(row[cuentaCol]),
suscripcion: clasificarSuscripcion(row[suscripcionCol]),
cp: cpCol ? parseInt(row[cpCol]) : null

})).filter(d=>d.suscripcion)

alert("Archivo cargado correctamente")

}

reader.readAsArrayBuffer(e.target.files[0])

})

function obtenerRevistasFiltro(){

let select = document.getElementById("revistasFiltro")

let seleccionadas = []

for(let o of select.selectedOptions){

seleccionadas.push(o.value)

}

return seleccionadas

}

function filtrarDatos(){

let revistasFiltro = obtenerRevistasFiltro()

let cpExacto = document.getElementById("cpExacto").value
let cpDesde = document.getElementById("cpDesde").value
let cpHasta = document.getElementById("cpHasta").value

return datos.filter(d=>{

if(revistasFiltro.length){

if(!revistasFiltro.includes(d.suscripcion)) return false

}

if(cpExacto){

if(d.cp != cpExacto) return false

}

if(cpDesde){

if(d.cp < cpDesde) return false

}

if(cpHasta){

if(d.cp > cpHasta) return false

}

return true

})

}

function procesar(){

let filtrados = filtrarDatos()

let mapaCuentas = {}

filtrados.forEach(d=>{

if(!mapaCuentas[d.cuenta]){

mapaCuentas[d.cuenta] = []

}

mapaCuentas[d.cuenta].push(d.suscripcion)

})

let combinaciones = {}

for(let cuenta in mapaCuentas){

let revistas = [...new Set(mapaCuentas[cuenta])]

revistas.sort()

let clave = revistas.join(" + ")

if(!combinaciones[clave]){

combinaciones[clave] = 0

}

combinaciones[clave]++

}

let html = ""

for(let comb in combinaciones){

let nombre = comb

if(comb.split(" + ").length === 1){

nombre = comb + " solo"

}

html += nombre.toUpperCase()+" : <b>"+combinaciones[comb]+"</b><br>"

}

document.getElementById("resultadoCombinaciones").innerHTML = html

let totalEnvio = 0
let pesoTotal = 0

for(let cuenta in mapaCuentas){

let revistas = [...new Set(mapaCuentas[cuenta])]

let pesoCuenta = 0

revistas.forEach(r=>{

let input = document.querySelector(`[data-revista="${r}"]`)

if(input){

pesoCuenta += parseFloat(input.value)

}

})

pesoTotal += pesoCuenta

let costo = 0

if(pesoCuenta<=1)
costo = parseFloat(document.getElementById("costo1").value)

else if(pesoCuenta<=2)
costo = parseFloat(document.getElementById("costo2").value)

else if(pesoCuenta<=5)
costo = parseFloat(document.getElementById("costo5").value)

else
costo = parseFloat(document.getElementById("costo10").value)

totalEnvio += costo

}

document.getElementById("resultadoEnvio").innerHTML=

"Peso total: <b>"+pesoTotal.toFixed(2)+" kg</b><br>"+
"Costo total envío: <b>$"+totalEnvio.toLocaleString()+"</b>"

}

</script>

</body>
</html>
