<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Combinaciones por Cuenta</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
h2 { margin-top: 30px; }
input { margin: 5px; padding: 5px; }
button { padding: 6px 12px; cursor: pointer; margin-top: 10px; }
.box { background: #f5f5f5; padding: 10px; margin-top: 15px; }
.result { background: #e9f5ff; padding: 10px; margin-top: 15px; }
</style>
</head>
<body>

<h1>Sistema de Suscripciones</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls" />

<h2>Peso por Revista (kg)</h2>
<div class="box">
Daños: <input type="number" step="0.1" data-revista="danos" value="0.5"><br>
Privado: <input type="number" step="0.1" data-revista="privado" value="0.5"><br>
Procesal: <input type="number" step="0.1" data-revista="procesal" value="0.5"><br>
Penal: <input type="number" step="0.1" data-revista="penal" value="0.5"><br>
Procesal Penal: <input type="number" step="0.1" data-revista="procesal penal" value="0.5"><br>
Laboral: <input type="number" step="0.1" data-revista="laboral" value="0.5"><br>
Actualidad: <input type="number" step="0.1" data-revista="actualidad" value="0.5"><br>
Penal Económico: <input type="number" step="0.1" data-revista="penal economico" value="0.5"><br>
</div>

<h2>Costos de Envío</h2>
<div class="box">
Hasta 1kg: <input type="number" id="costo1" value="5090"><br>
Hasta 2kg: <input type="number" id="costo2" value="7000"><br>
Hasta 5kg: <input type="number" id="costo5" value="12000"><br>
Hasta 10kg: <input type="number" id="costo10" value="20000"><br>
</div>

<button onclick="procesar()">Procesar Archivo</button>

<h2>Combinaciones Exactas por Cuenta</h2>
<div id="resultadoCombinaciones" class="result"></div>

<h2>Resumen Envíos</h2>
<div id="resultadoEnvio" class="result"></div>

<script>

let datos = [];

// Normaliza texto
function normalizar(texto){
if(!texto) return "";
return texto.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

// Detectar columnas automáticamente
function detectarColumnas(obj){
let columnas = Object.keys(obj);
let cuentaCol = columnas.find(c => normalizar(c).includes("cuenta"));
let suscripcionCol = columnas.find(c => normalizar(c).includes("suscrip"));
return {cuentaCol, suscripcionCol};
}

// Cargar Excel
document.getElementById("excelFile").addEventListener("change", function(e){

const reader = new FileReader();

reader.onload = function(event){

const data = new Uint8Array(event.target.result);
const workbook = XLSX.read(data, {type:'array'});
const sheet = workbook.Sheets[workbook.SheetNames[0]];
const json = XLSX.utils.sheet_to_json(sheet);

if(json.length === 0){
alert("Archivo vacío");
return;
}

const {cuentaCol, suscripcionCol} = detectarColumnas(json[0]);

if(!cuentaCol || !suscripcionCol){
alert("No se detectaron columnas correctas (Cuenta / Suscripción)");
return;
}

datos = json.map(row => ({
cuenta: normalizar(row[cuentaCol]),
suscripcion: normalizar(row[suscripcionCol])
}));

alert("Archivo cargado correctamente");

};

reader.readAsArrayBuffer(e.target.files[0]);

});

// PROCESAR COMBINACIONES CORRECTAMENTE
function procesar(){

let mapaCuentas = {};

// Agrupar TODAS las suscripciones por cuenta
datos.forEach(d => {

if(!mapaCuentas[d.cuenta]){
mapaCuentas[d.cuenta] = [];
}

mapaCuentas[d.cuenta].push(d.suscripcion);

});

// Generar combinación exacta por cuenta
let combinaciones = {};

for(let cuenta in mapaCuentas){

// eliminar duplicados
let revistas = [...new Set(mapaCuentas[cuenta])];

// ordenar alfabéticamente
revistas.sort();

// generar clave única
let clave = revistas.join(" + ");

if(!combinaciones[clave]){
combinaciones[clave] = 0;
}

combinaciones[clave]++;

}

// Mostrar combinaciones reales
let html = "";

for(let comb in combinaciones){

let nombre = comb;

if(comb.split(" + ").length === 1){
nombre = comb + " solo";
}

html += nombre.toUpperCase() + ": <b>" + combinaciones[comb] + "</b><br>";

}

document.getElementById("resultadoCombinaciones").innerHTML = html;


// CALCULAR ENVÍOS POR CUENTA
let totalEnvio = 0;
let pesoTotal = 0;

for(let cuenta in mapaCuentas){

let revistas = [...new Set(mapaCuentas[cuenta])];
let pesoCuenta = 0;

revistas.forEach(r => {

let input = document.querySelector(`[data-revista="${r}"]`);
if(input){
pesoCuenta += parseFloat(input.value);
}

});

pesoTotal += pesoCuenta;

let costo = 0;

if(pesoCuenta <= 1) costo = parseFloat(document.getElementById("costo1").value);
else if(pesoCuenta <= 2) costo = parseFloat(document.getElementById("costo2").value);
else if(pesoCuenta <= 5) costo = parseFloat(document.getElementById("costo5").value);
else costo = parseFloat(document.getElementById("costo10").value);

totalEnvio += costo;

}

document.getElementById("resultadoEnvio").innerHTML =
"Peso total general: <b>" + pesoTotal.toFixed(2) + " kg</b><br>" +
"Costo total de envío: <b>$" + totalEnvio.toLocaleString() + "</b>";

}

</script>

</body>
</html>
