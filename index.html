<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Combinaciones por Cuenta</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
margin:20px;
}

h2{
margin-top:30px;
}

input,select{
margin:5px;
padding:6px;
}

button{
padding:8px 14px;
cursor:pointer;
}

.box{
background:#f5f5f5;
padding:12px;
margin-top:10px;
}

.result{
background:#e9f5ff;
padding:12px;
margin-top:10px;
}

.rango{
margin-top:6px;
}

</style>
</head>

<body>

<h1>Sistema de Suscripciones</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<h2>Filtro Revistas</h2>

<div class="box">

<select id="revistasFiltro" multiple size="8">

<option value="danos">Daños</option>
<option value="privado">Privado</option>
<option value="procesal">Procesal</option>
<option value="penal">Penal</option>
<option value="procesal penal">Procesal Penal</option>
<option value="laboral">Laboral</option>
<option value="actualidad">Lab.Act.</option>
<option value="penal economico">Penal Económico</option>

</select>

</div>


<h2>Filtro Código Postal</h2>

<div class="box">

<div class="rango">
Desde <input type="number" id="desde1">
Hasta <input type="number" id="hasta1">
</div>

<div class="rango">
Desde <input type="number" id="desde2">
Hasta <input type="number" id="hasta2">
</div>

<div class="rango">
Desde <input type="number" id="desde3">
Hasta <input type="number" id="hasta3">
</div>

<div class="rango">
Desde <input type="number" id="desde4">
Hasta <input type="number" id="hasta4">
</div>

</div>


<h2>Peso por Revista (kg)</h2>

<div class="box">

Daños
<input type="number" step="0.1" data-revista="danos" value="0.5"><br>

Privado
<input type="number" step="0.1" data-revista="privado" value="0.5"><br>

Procesal
<input type="number" step="0.1" data-revista="procesal" value="0.5"><br>

Penal
<input type="number" step="0.1" data-revista="penal" value="0.5"><br>

Procesal Penal
<input type="number" step="0.1" data-revista="procesal penal" value="0.5"><br>

Laboral
<input type="number" step="0.1" data-revista="laboral" value="0.5"><br>

Lab.Act.
<input type="number" step="0.1" data-revista="actualidad" value="0.5"><br>

Penal Económico
<input type="number" step="0.1" data-revista="penal economico" value="0.5"><br>

</div>


<h2>Costos de Envío</h2>

<div class="box">

Hasta 1kg
<input type="number" id="costo1" value="5090"><br>

Hasta 2kg
<input type="number" id="costo2" value="7000"><br>

Hasta 5kg
<input type="number" id="costo5" value="12000"><br>

Hasta 10kg
<input type="number" id="costo10" value="20000"><br>

</div>

<button onclick="procesar()">Procesar</button>

<h2>Resultados</h2>
<div id="resultados"></div>

<script>

let datos=[]

function normalizar(texto){

if(!texto) return ""

return texto.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")

}

function clasificarSuscripcion(texto){

let t=normalizar(texto)

if(t.includes("lab.act")) return "actualidad"
if(t.includes("procesal penal")) return "procesal penal"
if(t.includes("penal econom")) return "penal economico"

if(t.includes("danos")) return "danos"
if(t.includes("privado")) return "privado"
if(t.includes("procesal")) return "procesal"
if(t.includes("penal")) return "penal"
if(t.includes("laboral")) return "laboral"

return null

}

function detectarColumnas(obj){

let columnas=Object.keys(obj)

let cuentaCol=columnas.find(c=>normalizar(c).includes("cuenta"))
let suscripcionCol=columnas.find(c=>normalizar(c).includes("suscrip"))
let cpCol=columnas.find(c=>normalizar(c).includes("postal")||normalizar(c)=="cp")

return{cuentaCol,suscripcionCol,cpCol}

}

document.getElementById("excelFile").addEventListener("change",function(e){

const reader=new FileReader()

reader.onload=function(event){

const data=new Uint8Array(event.target.result)

const workbook=XLSX.read(data,{type:'array'})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet)

const {cuentaCol,suscripcionCol,cpCol}=detectarColumnas(json[0])

datos=json.map(row=>({

cuenta:normalizar(row[cuentaCol]),
suscripcion:clasificarSuscripcion(row[suscripcionCol]),
cp:cpCol?parseInt(row[cpCol]):null

})).filter(d=>d.suscripcion)

alert("Archivo cargado correctamente")

}

reader.readAsArrayBuffer(e.target.files[0])

})

function obtenerRevistasFiltro(){

let select=document.getElementById("revistasFiltro")

let arr=[]

for(let o of select.selectedOptions){
arr.push(o.value)
}

return arr

}

function calcular(lista){

let mapa={}

lista.forEach(d=>{

if(!mapa[d.cuenta]) mapa[d.cuenta]=[]

mapa[d.cuenta].push(d.suscripcion)

})

let combinaciones={}

for(let cuenta in mapa){

let revistas=[...new Set(mapa[cuenta])]
revistas.sort()

let clave=revistas.join(" + ")

if(!combinaciones[clave]) combinaciones[clave]=0

combinaciones[clave]++

}

let pesoTotal=0
let totalEnvio=0

for(let cuenta in mapa){

let revistas=[...new Set(mapa[cuenta])]

let peso=0

revistas.forEach(r=>{

let input=document.querySelector(`[data-revista="${r}"]`)
peso+=parseFloat(input.value)

})

pesoTotal+=peso

let costo=0

if(peso<=1) costo=costo1.value
else if(peso<=2) costo=costo2.value
else if(peso<=5) costo=costo5.value
else costo=costo10.value

totalEnvio+=parseFloat(costo)

}

return{combinaciones,pesoTotal,totalEnvio}

}

function bloqueResultado(titulo,res){

let html="<div class='result'>"

html+="<h3>"+titulo+"</h3>"

for(let c in res.combinaciones){

let nombre=c

if(c.split(" + ").length==1) nombre=c+" solo"

html+=nombre.toUpperCase()+" : <b>"+res.combinaciones[c]+"</b><br>"

}

html+="<br>Peso total: <b>"+res.pesoTotal.toFixed(2)+" kg</b>"
html+="<br>Costo total envío: <b>$"+res.totalEnvio.toLocaleString()+"</b>"

html+="</div>"

return html

}

function procesar(){

let revistasFiltro=obtenerRevistasFiltro()

let base=datos.filter(d=>{

if(revistasFiltro.length && !revistasFiltro.includes(d.suscripcion))
return false

return true

})

let rangos=[

{d:desde1.value,h:hasta1.value},
{d:desde2.value,h:hasta2.value},
{d:desde3.value,h:hasta3.value},
{d:desde4.value,h:hasta4.value}

]

let usados=new Set()

let html=""

rangos.forEach(r=>{

let d=parseInt(r.d)
let h=parseInt(r.h)

if(!isNaN(d) && !isNaN(h)){

let lista=base.filter(x=>x.cp>=d && x.cp<=h)

lista.forEach(x=>usados.add(x))

let res=calcular(lista)

html+=bloqueResultado("Rango desde "+d+" hasta "+h,res)

}

})

let resto=base.filter(x=>!usados.has(x))

let resResto=calcular(resto)

html+=bloqueResultado("RESTO",resResto)

document.getElementById("resultados").innerHTML=html

}

</script>

</body>
</html>
