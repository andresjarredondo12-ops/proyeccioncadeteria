<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Suscripciones</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
margin:20px;
}

h2{
margin-top:30px;
}

input,select{
margin:5px;
padding:6px;
}

button{
padding:8px 14px;
cursor:pointer;
}

.box{
background:#f5f5f5;
padding:12px;
margin-top:10px;
}

.result{
background:#e9f5ff;
padding:12px;
margin-top:12px;
}

.rango{
border:1px solid #ccc;
padding:10px;
margin-bottom:15px;
}

</style>
</head>

<body>

<h1>Sistema de Suscripciones</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<h2>Filtro Revistas</h2>

<div class="box">

<select id="revistasFiltro" multiple size="8">

<option value="danos">Daños</option>
<option value="privado">Privado</option>
<option value="procesal">Procesal</option>
<option value="penal">Penal</option>
<option value="procesal penal">Procesal Penal</option>
<option value="laboral">Laboral</option>
<option value="actualidad">Lab.Act.</option>
<option value="penal economico">Penal Económico</option>

</select>

</div>

<h2>Peso por Revista (kg)</h2>

<div class="box">

Daños <input type="number" step="0.1" data-revista="danos" value="0.5"><br>
Privado <input type="number" step="0.1" data-revista="privado" value="0.5"><br>
Procesal <input type="number" step="0.1" data-revista="procesal" value="0.5"><br>
Penal <input type="number" step="0.1" data-revista="penal" value="0.5"><br>
Procesal Penal <input type="number" step="0.1" data-revista="procesal penal" value="0.5"><br>
Laboral <input type="number" step="0.1" data-revista="laboral" value="0.5"><br>
Lab.Act. <input type="number" step="0.1" data-revista="actualidad" value="0.5"><br>
Penal Económico <input type="number" step="0.1" data-revista="penal economico" value="0.5"><br>

</div>

<button onclick="procesar()">Procesar</button>

<h2>Resultados</h2>

<div id="resultados"></div>

<script>

let datos=[]

function normalizar(texto){

if(!texto) return ""

return texto.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")

}

function clasificarSuscripcion(texto){

let t=normalizar(texto)

/* ACTUALIDAD */

if(
t.includes("lab.act") ||
t.includes("lab act") ||
t.includes("actualidad")
) return "actualidad"

/* PROCESAL PENAL */

if(
t.includes("procesal penal") ||
t.includes("proc penal") ||
t.includes("proc.penal") ||
t.includes("proc penal")
) return "procesal penal"

/* PENAL ECONOMICO */

if(
t.includes("penal econom") ||
t.includes("penal econ") ||
t.includes("penal econ.")
) return "penal economico"

/* DAÑOS */

if(
t.includes("danos") ||
t.includes("daño")
) return "danos"

/* PRIVADO */

if(t.includes("privado")) return "privado"

/* PROCESAL */

if(
t.includes("procesal") ||
t.includes("proc.")
) return "procesal"

/* PENAL */

if(t.includes("penal")) return "penal"

/* LABORAL */

if(t.includes("laboral")) return "laboral"

return null

}

function detectarColumnas(obj){

let columnas=Object.keys(obj)

let cuentaCol=columnas.find(c=>normalizar(c).includes("cuenta"))
let suscripcionCol=columnas.find(c=>normalizar(c).includes("suscrip"))
let cpCol=columnas.find(c=>normalizar(c).includes("postal")||normalizar(c)=="cp")

return{cuentaCol,suscripcionCol,cpCol}

}

document.getElementById("excelFile").addEventListener("change",function(e){

const reader=new FileReader()

reader.onload=function(event){

const data=new Uint8Array(event.target.result)

const workbook=XLSX.read(data,{type:'array'})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet)

const {cuentaCol,suscripcionCol,cpCol}=detectarColumnas(json[0])

datos=json.map(row=>({

cuenta:normalizar(row[cuentaCol]),
suscripcion:clasificarSuscripcion(row[suscripcionCol]),
cp:cpCol?parseInt(row[cpCol]):null

})).filter(d=>d.suscripcion)

alert("Archivo cargado")

}

reader.readAsArrayBuffer(e.target.files[0])

})

function costo(peso,c1,c2,c5,c10){

if(peso<=1) return c1
if(peso<=2) return c2
if(peso<=5) return c5
return c10

}

function calcular(lista,costos){

let cuentas={}

lista.forEach(d=>{

if(!cuentas[d.cuenta]) cuentas[d.cuenta]=[]

cuentas[d.cuenta].push(d.suscripcion)

})

let combinaciones={}
let pesoTotal=0
let costoTotal=0

for(let c in cuentas){

let revistas=[...new Set(cuentas[c])]

revistas.sort()

let clave=revistas.join(" + ")

if(!combinaciones[clave]) combinaciones[clave]=0

combinaciones[clave]++

let peso=0

revistas.forEach(r=>{

let input=document.querySelector(`[data-revista="${r}"]`)

peso+=parseFloat(input.value)

})

pesoTotal+=peso

costoTotal+=costo(peso,costos.c1,costos.c2,costos.c5,costos.c10)

}

return{combinaciones,pesoTotal,costoTotal}

}

function resultado(titulo,res){

let html="<div class='result'>"

html+="<h3>"+titulo+"</h3>"

for(let c in res.combinaciones){

let nombre=c

if(c.split(" + ").length==1) nombre=c+" solo"

html+=nombre.toUpperCase()+" : <b>"+res.combinaciones[c]+"</b><br>"

}

html+="<br>Peso total: <b>"+res.pesoTotal.toFixed(2)+" kg</b>"
html+="<br>Costo total envío: <b>$"+res.costoTotal.toLocaleString()+"</b>"

html+="</div>"

return html

}

function procesar(){

let lista=datos

let costos={c1:5090,c2:7000,c5:12000,c10:20000}

let res=calcular(lista,costos)

document.getElementById("resultados").innerHTML=resultado("TOTAL",res)

}

</script>

</body>
</html>
