<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Suscripciones y Envíos</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
h2 { margin-top: 30px; }
table { border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; }
input, select { margin: 5px; padding: 5px; }
button { padding: 6px 12px; cursor: pointer; }
.config-box { background: #f5f5f5; padding: 10px; margin-bottom: 15px; }
.result-box { background: #e9f5ff; padding: 10px; margin-top: 15px; }
</style>
</head>
<body>

<h1>Sistema de Gestión de Suscripciones</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls" />

<h2>Filtrar por Suscripción</h2>
<select id="filtro">
<option value="">-- Seleccionar --</option>
<option value="Daños">Daños</option>
<option value="Privado">Privado</option>
<option value="Procesal">Procesal</option>
<option value="Penal">Penal</option>
<option value="Procesal Penal">Procesal Penal</option>
<option value="Laboral">Laboral</option>
<option value="Actualidad">Actualidad</option>
<option value="Penal Economico">Penal Economico</option>
</select>

<button onclick="filtrar()">Filtrar</button>

<div id="resultadoFiltro" class="result-box"></div>

<h2>Configuración Peso por Revista (kg)</h2>
<div class="config-box">
Daños: <input type="number" step="0.1" id="peso_Daños" value="0.5">
Privado: <input type="number" step="0.1" id="peso_Privado" value="0.5">
Procesal: <input type="number" step="0.1" id="peso_Procesal" value="0.5">
Penal: <input type="number" step="0.1" id="peso_Penal" value="0.5">
Procesal Penal: <input type="number" step="0.1" id="peso_Procesal Penal" value="0.5">
Laboral: <input type="number" step="0.1" id="peso_Laboral" value="0.5">
Actualidad: <input type="number" step="0.1" id="peso_Actualidad" value="0.5">
Penal Economico: <input type="number" step="0.1" id="peso_Penal Economico" value="0.5">
</div>

<h2>Configuración Costo de Envío</h2>
<div class="config-box">
Hasta 1kg: <input type="number" id="costo1" value="5090"><br>
Hasta 2kg: <input type="number" id="costo2" value="7000"><br>
Hasta 5kg: <input type="number" id="costo5" value="12000"><br>
Hasta 10kg: <input type="number" id="costo10" value="20000"><br>
</div>

<button onclick="calcularEnvio()">Calcular Envío Total</button>

<div id="resultadoEnvio" class="result-box"></div>

<h2>Estadísticas por Número de Cuenta</h2>
<button onclick="calcularCombinaciones()">Calcular Combinaciones</button>
<div id="resultadoCombinaciones" class="result-box"></div>

<script>
let datos = [];

document.getElementById('excelFile').addEventListener('change', function(e) {
const reader = new FileReader();
reader.onload = function(event) {
const data = new Uint8Array(event.target.result);
const workbook = XLSX.read(data, {type: 'array'});
const sheet = workbook.Sheets[workbook.SheetNames[0]];
datos = XLSX.utils.sheet_to_json(sheet);
alert("Archivo cargado correctamente");
};
reader.readAsArrayBuffer(e.target.files[0]);
});

function filtrar() {
const tipo = document.getElementById("filtro").value;
const filtrados = datos.filter(d => d.Suscripcion && d.Suscripcion.includes(tipo));
document.getElementById("resultadoFiltro").innerHTML =
"Total encontrados: " + filtrados.length;
}

function calcularCombinaciones() {
let cuentas = {};

datos.forEach(d => {
if(!cuentas[d.NumeroCuenta]) cuentas[d.NumeroCuenta] = [];
cuentas[d.NumeroCuenta].push(d.Suscripcion);
});

let privadoSolo = 0;
let privadoDanios = 0;
let privadoProcesal = 0;
let privadoDaniosProcesal = 0;

for(let cuenta in cuentas){
let subs = cuentas[cuenta];

if(subs.includes("Privado") && subs.length === 1)
privadoSolo++;

if(subs.includes("Privado") && subs.includes("Daños") && subs.length === 2)
privadoDanios++;

if(subs.includes("Privado") && subs.includes("Procesal") && subs.length === 2)
privadoProcesal++;

if(subs.includes("Privado") && subs.includes("Daños") && subs.includes("Procesal") && subs.length === 3)
privadoDaniosProcesal++;
}

document.getElementById("resultadoCombinaciones").innerHTML = `
Privado solo: ${privadoSolo}<br>
Privado + Daños: ${privadoDanios}<br>
Privado + Procesal: ${privadoProcesal}<br>
Privado + Daños + Procesal: ${privadoDaniosProcesal}
`;
}

function calcularEnvio(){
let cuentas = {};
let totalEnvio = 0;

datos.forEach(d => {
if(!cuentas[d.NumeroCuenta]) cuentas[d.NumeroCuenta] = [];
cuentas[d.NumeroCuenta].push(d.Suscripcion);
});

for(let cuenta in cuentas){
let pesoTotal = 0;

cuentas[cuenta].forEach(sub => {
let input = document.getElementById("peso_" + sub);
if(input) pesoTotal += parseFloat(input.value);
});

let costo = 0;
if(pesoTotal <= 1) costo = parseFloat(document.getElementById("costo1").value);
else if(pesoTotal <= 2) costo = parseFloat(document.getElementById("costo2").value);
else if(pesoTotal <= 5) costo = parseFloat(document.getElementById("costo5").value);
else costo = parseFloat(document.getElementById("costo10").value);

totalEnvio += costo;
}

document.getElementById("resultadoEnvio").innerHTML =
"Costo total de envío: $" + totalEnvio.toLocaleString();
}
</script>

</body>
</html>
